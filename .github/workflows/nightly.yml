name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: OnType branch, tag, or SHA to build
        required: false
        default: main
      version:
        description: Optional app version. Defaults to 0.0.0-beta.YYYYMMDD.RUN.SHA.
        required: false
      notarized:
        description: Notarize the DMG before upload
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: write

concurrency:
  group: nightly-build
  cancel-in-progress: false

env:
  ONTYPE_SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || 'main' }}
  ONTYPE_LIBFST_REF: v0.1.0
  ONTYPE_ITN_REF: v0.1.0
  ONTYPE_PLATFORM: arm64
  ONTYPE_NOTARIZED: ${{ github.event_name != 'workflow_dispatch' || inputs.notarized }}
  NIGHTLY_TAG: nightly

jobs:
  build:
    name: Build macOS nightly
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout release repository
        uses: actions/checkout@v6.0.2

      - name: Check private source token
        env:
          ONTYPE_SOURCE_TOKEN: ${{ secrets.ONTYPE_SOURCE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ONTYPE_SOURCE_TOKEN:-}" ]; then
            echo "ONTYPE_SOURCE_TOKEN is required to checkout private OnType source repositories." >&2
            exit 1
          fi

      - name: Checkout OnType source
        uses: actions/checkout@v6.0.2
        with:
          repository: ontypehq/OnType
          ref: ${{ env.ONTYPE_SOURCE_REF }}
          token: ${{ secrets.ONTYPE_SOURCE_TOKEN }}
          path: OnType
          fetch-depth: 1
          lfs: true
          # The source repo currently has an orphan gitlink without .gitmodules;
          # checkout's credential cleanup runs `git submodule foreach` and fails there.
          persist-credentials: true

      - name: Checkout libfst
        uses: actions/checkout@v6.0.2
        with:
          repository: ontypehq/libfst
          ref: ${{ env.ONTYPE_LIBFST_REF }}
          token: ${{ secrets.ONTYPE_SOURCE_TOKEN }}
          path: libfst
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout ITN
        uses: actions/checkout@v6.0.2
        with:
          repository: ontypehq/itn
          ref: ${{ env.ONTYPE_ITN_REF }}
          token: ${{ secrets.ONTYPE_SOURCE_TOKEN }}
          path: itn
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install build tools
        run: brew install create-dmg librsvg rclone zig

      - name: Link external repositories
        working-directory: OnType
        run: |
          set -euo pipefail
          mkdir -p externals
          ln -sfn "$GITHUB_WORKSPACE/libfst" externals/libfst
          ln -sfn "$GITHUB_WORKSPACE/itn" externals/itn
          test -d externals/libfst
          test -d externals/itn

      - name: Restore Convex xcframework cache
        uses: actions/cache@v5.0.5
        with:
          path: OnType/externals/convex-xcframework
          key: convex-xcframework-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('OnType/macos/Package.resolved') }}
          restore-keys: |
            convex-xcframework-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare App Store Connect API key
        working-directory: OnType
        env:
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${NOTARY_KEY_P8_BASE64:-}" ]; then
            echo "NOTARY_KEY_P8_BASE64 is required." >&2
            exit 1
          fi
          printf '%s' "$NOTARY_KEY_P8_BASE64" | base64 -D > AuthKey_UPM4638DP7.p8
          chmod 600 AuthKey_UPM4638DP7.p8

      - name: Install OnType dependencies
        working-directory: OnType
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install embedded WebUI dependencies
        working-directory: OnType/webui
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build libfst dynamic library for ITN export
        working-directory: libfst
        run: zig build -Dlinkage=dynamic -Doptimize=ReleaseFast

      - name: Resolve nightly version
        id: version
        working-directory: OnType
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse --short=12 HEAD)"
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
          else
            build_date="$(date -u +%Y%m%d)"
            version="0.0.0-beta.${build_date}.${GITHUB_RUN_NUMBER}.${source_sha}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "ONTYPE_VERSION=$version" >> "$GITHUB_ENV"
          echo "ONTYPE_SOURCE_SHA=$source_sha" >> "$GITHUB_ENV"

      - name: Build notarized DMG
        if: env.ONTYPE_NOTARIZED == 'true'
        working-directory: OnType
        env:
          ONTYPE_AUTH_BASE_URL: ${{ secrets.ONTYPE_AUTH_BASE_URL }}
          ONTYPE_AUTH_BASE_URL_DEV: ${{ secrets.ONTYPE_AUTH_BASE_URL_DEV }}
          ONTYPE_AUTH_BASE_URL_PROD: ${{ secrets.ONTYPE_AUTH_BASE_URL_PROD }}
          CONVEX_URL_DEV: ${{ secrets.CONVEX_URL_DEV }}
          CONVEX_URL_PROD: ${{ secrets.CONVEX_URL_PROD }}
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_FILE: AuthKey_UPM4638DP7.p8
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_ASSETS_BASE_URL: ${{ secrets.CF_ASSETS_BASE_URL }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}
          ONTYPE_ITN_ROOT: externals/itn
          LIBFST_ROOT: ${{ github.workspace }}/libfst
        run: bun run app:release --appVersion "$ONTYPE_VERSION" --platform "$ONTYPE_PLATFORM" --out dist

      - name: Build signed DMG without notarization
        if: env.ONTYPE_NOTARIZED != 'true'
        working-directory: OnType
        env:
          ONTYPE_AUTH_BASE_URL: ${{ secrets.ONTYPE_AUTH_BASE_URL }}
          ONTYPE_AUTH_BASE_URL_DEV: ${{ secrets.ONTYPE_AUTH_BASE_URL_DEV }}
          ONTYPE_AUTH_BASE_URL_PROD: ${{ secrets.ONTYPE_AUTH_BASE_URL_PROD }}
          CONVEX_URL_DEV: ${{ secrets.CONVEX_URL_DEV }}
          CONVEX_URL_PROD: ${{ secrets.CONVEX_URL_PROD }}
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_FILE: AuthKey_UPM4638DP7.p8
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_ASSETS_BASE_URL: ${{ secrets.CF_ASSETS_BASE_URL }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ secrets.SENTRY_TRACES_SAMPLE_RATE }}
          ONTYPE_ITN_ROOT: externals/itn
          LIBFST_ROOT: ${{ github.workspace }}/libfst
        run: bun run app:release --appVersion "$ONTYPE_VERSION" --platform "$ONTYPE_PLATFORM" --out dist --notarized false

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: OnType-${{ steps.version.outputs.version }}-${{ env.ONTYPE_PLATFORM }}
          path: OnType/dist/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Publish rolling GitHub nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/nightly-notes.md"
          {
            echo "OnType nightly build."
            echo
            echo "- Version: \`${ONTYPE_VERSION}\`"
            echo "- Source ref: \`${ONTYPE_SOURCE_REF}\`"
            echo "- Source SHA: \`${ONTYPE_SOURCE_SHA}\`"
            echo "- libfst ref: \`${ONTYPE_LIBFST_REF}\`"
            echo "- ITN ref: \`${ONTYPE_ITN_REF}\`"
            echo "- Platform: \`${ONTYPE_PLATFORM}\`"
            echo "- Notarized: \`${ONTYPE_NOTARIZED}\`"
          } > "$notes_file"

          if ! gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            gh release create "$NIGHTLY_TAG" --prerelease --title "OnType Nightly" --notes-file "$notes_file"
          fi

          gh release view "$NIGHTLY_TAG" --json assets --jq '.assets[].name' \
            | while IFS= read -r asset; do
                [ -z "$asset" ] && continue
                gh release delete-asset "$NIGHTLY_TAG" "$asset" -y
              done

          gh release upload "$NIGHTLY_TAG" OnType/dist/*.dmg --clobber
          gh release edit "$NIGHTLY_TAG" --prerelease --title "OnType Nightly ($ONTYPE_VERSION)" --notes-file "$notes_file"
